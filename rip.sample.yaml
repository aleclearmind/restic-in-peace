added-size-limit: 5GB
skip-on-battery: true
wifi-whitelist:
  - whitelisted-network
wifi-blacklist:
  - blacklisted-network
desktop-notifications: true

profiles:
  common:
    repository: <repo_path_or_url>
    env:
      RESTIC_PASSWORD: <your-strong-password>
    forget:
      keep-daily: 7
      keep-weekly: 4
      keep-monthly: 6
      keep-yearly: 1
      prune: false

  laptop:
    inherit: common
    backup:
      source:
        - /home/<user>
      tag: laptop

fix-homes:
  <user>:
    ignore:
      - .cache
      - .config
    .dotfiles:
      - .vimrc
      - .bashrc

log-path: backup-logs
