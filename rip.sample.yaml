profiles:
  common:
    repository: <repo_path_or_url>
    env:
      RESTIC_PASSWORD: <your-strong-password>
    added-size-limit: 5GB
    skip-on-battery: true
    wifi-whitelist:
      - whitelisted-network
    wifi-blacklist:
      - blacklisted-network
    monitor-url:
      - https://<monitor_host>/restic
    backup:
      desktop-notifications: true
    forget:
      keep-daily: 7
      keep-weekly: 4
      keep-monthly: 6
      keep-yearly: 1
      prune: false

  laptop:
    inherit: common
    backup:
      source:
        - /home/<user>
      tag: laptop

fix-homes:
  <user>:
    ignore:
      - .cache
      - .config
    .dotfiles:
      - .vimrc
      - .bashrc

run-backup:
  log-path: backup-logs
